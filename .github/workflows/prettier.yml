name: Prettier Auto-Format

on:
  push:
    branches: [main]

# 봇에게 코드를 쓸 수 있는 권한을 명시적으로 줍니다.
permissions:
  contents: write

jobs:
  prettier:
    runs-on: ubuntu-latest
    env:
      # 2026년 환경에 맞춰 Node.js 24를 강제로 사용하도록 설정합니다.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prettier Auto-Fix
        uses: creyD/prettier_action@v4.3
        with:
          # 지적만 하지 말고 직접 수정(--write)하게 합니다.
          prettier_options: --write **/*.{yml,md,html,css,js}
          commit_message: "style: 🎨 auto-format by prettier robot"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}