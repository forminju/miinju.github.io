name: Prettier Auto-Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 커밋을 위해 권한이 필요합니다.
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Prettier Auto-Fix
        # 지적만 하는 게 아니라 직접 수정해서 다시 올려주는 액션입니다.
        uses: creyD/prettier_action@v4.3
        with:
          # 수정할 파일 확장자를 정합니다. (yml, md 등)
          prettier_options: --write **/*.{yml,md}
          commit_message: "style: 🎨 auto-format with Prettier"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}