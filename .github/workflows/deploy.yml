name: Deploy site

on:
  push:
    branches:
      - main  # 민주님의 기본 브랜치가 main인지 확인하세요!
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
  workflow_dispatch:

# 2026년 환경 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3" # 최신 버전 유지
          bundler-cache: true

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build with Jekyll 🔧
        # 문제가 되던 ImageMagick 설치를 빼고 순수 빌드만 진행합니다.
        run: |
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build
        
      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4